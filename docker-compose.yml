version: '3.8'

services:
  backend:
    build: ./backend
    container_name: chatflow-backend
    env_file:
      - ./backend/.env
    environment:
      ENV: production
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chatflow-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
