# ── ChatFlow CRM — Render Blueprint ────────────────────────────
# Deploy: connect this repo to Render and it auto-detects this file
# Single service: Backend serves API + WebSocket + static frontend files

services:
  - type: web
    name: chatflow
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend && npm install && npm run build && cd ../backend
      mkdir -p static
      cp -r ../frontend/dist/* static/
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chatflow-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        value: chatflow_verify_2024
      - key: WHATSAPP_PHONE_IDS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SERVE_FRONTEND
        value: "true"
